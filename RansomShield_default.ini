; ===========================================================
; RansomShield 設定ファイル
; ===========================================================
; 各項目を 1=有効 / 0=無効 で設定してください。
; このファイルをコピーしてPC名に合わせた設定を作成できます。
; 例: RansomShield_PC01.ini / RansomShield_経理PC.ini
; ===========================================================

[Security]
; CFA（コントロールドフォルダーアクセス）
; ランサムウェアによる重要フォルダへの書き込みをブロック
CFA=1

; SMB / 管理共有ブロック
; 社内LAN経由の横展開を防止（複合機など除外IPはSmbTrustedIPsで設定）
SMB=1

; RDP 無効化
; リモートデスクトップ経由の侵入を遮断
RDP=1

; USB AutoRun 無効化
; USBメモリ経由の自動実行感染を防止
AutoRun=1

; UAC 最大レベル
; 権限昇格による被害拡大を抑制
UAC=1

[SmbTrustedIPs]
; SMBブロック中でもアクセスを許可するIPアドレス（複合機・プリンターなど）
; 複数ある場合はカンマ区切り（例: 192.168.1.100,192.168.1.101）
; 不要な場合は空欄のままにしてください
IPs=

[CfaAllowedApps]
; CFAで保護フォルダへの書き込みを許可するアプリの完全パス
; 複数ある場合はカンマ区切り
; 例: C:\tools\myapp.exe,C:\Python312\python.exe
Apps=

[Mode]
; 実行モード
; silent    = 確認なしで設定を自動適用（GPO・タスクスケジューラ向け）
; interactive = 通常のメニュー画面を表示（手動操作向け）
RunMode=silent

[Log]
; 適用結果をWindowsイベントログに記録する（1=する / 0=しない）
WriteEventLog=1
